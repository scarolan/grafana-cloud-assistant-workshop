## Lab 04: Investigation
#### Grafana Assistant Workshop

<span class="subtitle">~60 minutes</span>

---

## The Scenario

> "I've been trying to check out for the last 20 minutes and keep getting errors. Other people on my team are seeing the same thing."

That's all you know. Start there.

---

## Two Modes of Investigation

**Part A — Conversation (GA)**

Step-by-step detective work: scope the problem, follow the errors, trace the request path, confirm root cause.

You drive. Assistant executes.

**Part B — Formal Investigation (Public Preview)**

A Lead agent orchestrates 20+ specialist agents in parallel. They analyze metrics, logs, traces, and resources simultaneously.

You describe the problem. The swarm investigates.

---

## What You'll Do

- Start from a vague user complaint and narrow to a root cause
- Use **follow-up chips** to navigate without typing every query
- Create an **alert rule** so you'd catch it faster next time
- Launch a formal **Investigation** and review the findings
- Explore the **Agent activity** Gantt chart, root causes, and recommendations

---
