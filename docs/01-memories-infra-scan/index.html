## Lab 01: Memories & Infra Scan
#### Grafana Assistant Workshop

<span class="subtitle">~30 minutes</span>

---

## The Problem

Without context, Assistant has to guess:

- What services exist?
- What are your metric names?
- What matters to your team?

Two features solve this: **memories** and **rules**.

---

## Memories vs. Rules

| | Memories | Rules |
|---|---------|-------|
| **Created by** | Auto-scan of your data sources | You write them |
| **Describes** | What exists (services, labels, topology) | How to behave (priorities, conventions) |
| **Scope** | Org-wide | Just me or Everybody |

**Memories** = Assistant learns your environment

**Rules** = You teach Assistant your preferences

---

## What You'll Do

- Run the **Discovery Scan** (Settings > Assistant memories)
- See what Assistant learns about your telescope shop services
- Create a **custom rule** that prioritizes the checkout service
- Test whether the rule changes Assistant's answers
