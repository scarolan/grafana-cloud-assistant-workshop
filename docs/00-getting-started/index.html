## Lab 00: Getting Started
#### Grafana Assistant Workshop

<span class="subtitle">~15 minutes</span>

---

## What We're Working With

**appenv** — a realistic e-commerce app (telescope shop)

- 15+ microservices: frontend, checkout, cart, payment, product catalog...
- Real traffic flowing continuously
- Metrics, logs, and traces in Grafana Cloud
- A **scheduled daily outage** we'll investigate later

You don't need to run or configure anything.

---

## What You'll Do

- Log into the shared Grafana stack
- Create a **personal folder** (so your work doesn't collide with others)
- Find **Grafana Assistant** and send your first message
- Orient yourself to the conversation interface

---

## Key Things to Notice

- The **`@` symbol** opens a data source context picker
- The **gear icon** gives quick access to Rules, MCP servers, and Settings
- **Follow-up chips** appear after every response — click them to keep going
- The right panel shows your conversation; the left shows the main page

---

## Go Do the Lab

Open the lab instructions and follow along:

**labs/00-getting-started.md**
