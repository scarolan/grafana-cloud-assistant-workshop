## Lab 02: MCP Servers
#### Grafana Assistant Workshop

<span class="subtitle">~20 minutes</span>

---

## What is MCP?

**Model Context Protocol** — an open standard that lets AI assistants connect to external tools.

Without MCP: Assistant answers questions from your data sources.

With MCP: Assistant can **take action** in external systems — search GitHub, query Kubernetes, interact with PagerDuty.

Think of MCP servers as **plugins** for your AI assistant.

---

## What's Already Connected

This environment has a **Kubernetes MCP server** pre-configured:

- 8 tools enabled (pod status, deployments, logs, etc.)
- Healthy and ready to use
- Accessible to all users in this stack

The **Quick setup** catalog has more: GitHub, Cloudflare, PagerDuty, and custom servers.

---

## What You'll Do

- Find the MCP servers page (Settings > Integrations)
- Verify the Kubernetes MCP server is healthy
- Ask Assistant what tools it has available
- Use a built-in tool to search for dashboards
